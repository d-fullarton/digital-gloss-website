<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us — Digital Gloss</title>
<meta name="description" content="About Digital Gloss.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="grain"></div>

<header class="nav" id="top">
  <div class="nav-inner">
    <a class="wordmark" href="index.html">Digital<span>Gloss</span></a>
    <nav class="nav-links" id="navLinks">
      <a href="about.html">About Us</a>
      <a href="services.html">Services</a>
      <a href="process.html">Process</a>
      <a href="contact.html">Contact</a>
    </nav>
    <a class="btn btn-primary btn-small js-open-quote" href="index.html#contact">Get a free proposal</a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main>
  <section class="page-blank"></section>
</main>

<footer class="footer">
  <div class="footer-inner">
    <a class="wordmark wordmark-small" href="index.html">Digital<span>Gloss</span></a>
    <nav class="footer-links">
      <a href="about.html">About Us</a>
      <a href="services.html">Services</a>
      <a href="process.html">Process</a>
      <a href="contact.html">Contact</a>
    </nav>
    <p class="footer-copy">&copy; 2026 Digital Gloss. All rights reserved.</p>
  </div>
</footer>

<div class="modal-overlay" id="quoteOverlay" hidden>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="quoteTitle">
    <button type="button" class="modal-close" id="quoteClose" aria-label="Close">&times;</button>

    <p class="eyebrow">Let's talk</p>
    <h2 id="quoteTitle" class="modal-title">Let's talk. Tell us about your business.</h2>

    <form class="quote-form" id="quoteForm">
      <div class="form-row">
        <div class="field">
          <label for="qFirstName">First name</label>
          <input type="text" id="qFirstName" name="firstName" autocomplete="given-name" required>
        </div>
        <div class="field">
          <label for="qLastName">Last name</label>
          <input type="text" id="qLastName" name="lastName" autocomplete="family-name" required>
        </div>
      </div>

      <div class="field">
        <label for="qWebsite">Website URL</label>
        <input type="url" id="qWebsite" name="website" autocomplete="url" placeholder="https://yourbusiness.com">
      </div>

      <div class="field">
        <label for="qEmail">Email</label>
        <input type="email" id="qEmail" name="email" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="qPhone">Phone number</label>
        <div class="phone-row">
          <select id="qCountryCode" name="countryCode" aria-label="Country code">
            <option value="+1" selected>+1 (US/CA)</option>
            <option value="+44">+44 (UK)</option>
            <option value="+353">+353 (IE)</option>
            <option value="+61">+61 (AU)</option>
            <option value="+64">+64 (NZ)</option>
            <option value="+971">+971 (UAE)</option>
            <option value="+966">+966 (SA)</option>
            <option value="+91">+91 (IN)</option>
            <option value="+27">+27 (ZA)</option>
            <option value="+49">+49 (DE)</option>
            <option value="+33">+33 (FR)</option>
            <option value="+34">+34 (ES)</option>
            <option value="+39">+39 (IT)</option>
            <option value="+31">+31 (NL)</option>
            <option value="+46">+46 (SE)</option>
            <option value="+41">+41 (CH)</option>
            <option value="+81">+81 (JP)</option>
            <option value="+86">+86 (CN)</option>
            <option value="+65">+65 (SG)</option>
            <option value="+52">+52 (MX)</option>
            <option value="+55">+55 (BR)</option>
          </select>
          <input type="tel" id="qPhone" name="phone" autocomplete="tel-national" placeholder="555 123 4567">
        </div>
      </div>

      <fieldset class="form-fieldset">
        <legend>What's feeling most behind right now?</legend>

        <label class="checkbox-option">
          <input type="checkbox" name="interest" value="I am looking for my first website that reflects my brand identity">
          <span>I am looking for my first website that reflects my brand identity</span>
        </label>
        <label class="checkbox-option">
          <input type="checkbox" name="interest" value="My current website doesn't reflect my brand">
          <span>My current website doesn't reflect my brand</span>
        </label>
        <label class="checkbox-option">
          <input type="checkbox" name="interest" value="I am invisible on Google and AI searches">
          <span>I am invisible on Google and AI searches</span>
        </label>
        <label class="checkbox-option">
          <input type="checkbox" name="interest" value="I want to explore how AI tools could streamline my business">
          <span>I want to explore how AI tools could streamline my business</span>
        </label>
      </fieldset>

      <button type="submit" class="btn btn-primary btn-large modal-submit">Send inquiry</button>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
